name: Build TWRP for gta4lve

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sushrut1101/docker-cyanogenmod:latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Sync TWRP Source
      run: |
        mkdir twrp
        cd twrp
        git config --global user.name "faksgis"
        git config --global user.email "a01096901125z@gmail.com"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-10.0
        repo sync -j$(nproc) --force-sync

    - name: Insert Device Tree
      run: |
        mkdir -p twrp/device/samsung/gta4lve
        cp -r * twrp/device/samsung/gta4lve/ || true

    - name: Building TWRP
      run: |
        cd twrp
        export HOME=/root
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch omni_gta4lve-eng
        make recoveryimage -j$(nproc)

    - name: Upload TWRP Artifacts
      uses: actions/checkout@v4
      with:
        repository: actions/upload-artifact
        ref: v4
